<!doctype html>
<body>
  <h3>Mouse button demo</h3>
  <div id="box" style="width:300px;height:100px;border:1px solid#000">Click me</div>
  <script>
    const box = document.getElementById('box');
    box.addEventListener('mousedown', e=>{
      if (e.button===0) alert('Left Clicked');
      if (e.button===2) alert('Right Clicked');
    });
    // Prevent context menu so right-click is handled
    box.addEventListener('contextmenu', e=>e.preventDefault());
  </script>
</body>
</html>
