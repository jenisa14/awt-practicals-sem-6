    //6.      *     *     *     *       *
      //        @      @     @      @
      //           *      *     *

        let rows = parseInt(prompt("Enter number of rows (suggested: 5):"));

    for (let i = 1; i <= rows; i++) {
        let pattern = "";

        // Print spaces
        for (let s = 1; s < i; s++) {
            pattern += "&nbsp;&nbsp;";
        }

        // Print character
        for (let j = 1; j <= (rows - i + 1); j++) {
            if (i % 2 === 1) {
                pattern += "*";
            } else {
                pattern += "@";
            }
        }

        document.write(pattern + "<br>");
    }
